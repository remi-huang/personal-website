  <link rel="alternate" hreflang="x-default" href="/index.html" />
  <meta property="og:type" content="website" />

  <meta name="twitter:image" content="/uploads/onemoment-icon.png" />
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
  <link rel="preload" href="https://raw.githubusercontent.com/Chenyu-otf/chenyuluoyan_thin/main/ChenYuluoyan-2.0-Thin.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      font-family: var(--font-body);
      color: var(--ink-black);
    }

    * { box-sizing: border-box; }

    a { color: inherit; }

    .site-shell {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 16% 12%, rgba(29, 58, 138, 0.035), transparent 38%),
        radial-gradient(ellipse at 88% 86%, rgba(217, 74, 58, 0.035), transparent 36%),
        var(--paper);
      position: relative;
      overflow: hidden;
    }

    .site-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.34;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.055'/></svg>");
      mix-blend-mode: multiply;
    }

    .hero {
      width: min(100%, 1440px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 36px 56px 30px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      z-index: 1;
    }

    .hero-nav {
      display: flex;
      align-items: flex-start;
      gap: var(--nav-gap);
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--nav-font-size);
      letter-spacing: var(--nav-letter-spacing);
      left: 50%;
      position: fixed;
      top: var(--nav-top);
      transform: translateX(-50%);
      width: min(calc(100% - (var(--nav-page-gutter) * 2)), var(--nav-max-width));
      z-index: 80;
    }

    .hero-nav a,
    .hero-nav span {
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-active,
    .nav-contact,
    .hero-nav-items > a {
      position: relative;
      display: inline-block;
    }

    .nav-spacer {
      flex: 1;
    }

    .lang-switch {
      align-items: center;
      color: var(--ink-soft);
      display: inline-flex;
      gap: 6px;
      margin-left: 12px;
    }

    .lang-switch button {
      background: transparent;
      border: 0;
      color: inherit;
      cursor: pointer;
      font: inherit;
      letter-spacing: inherit;
      padding: 0;
      text-transform: uppercase;
    }

    .lang-switch button.is-active {
      color: var(--ink-blue);
    }

    .hero-nav-items {
      align-items: flex-start;
      display: flex;
      flex: 1;
      gap: var(--nav-gap);
    }

    .hero-nav-toggle {
      align-items: center;
      background: transparent;
      border: 0;
      color: var(--ink-soft);
      cursor: pointer;
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      gap: 8px;
      letter-spacing: 0.08em;
      padding: 6px 4px;
      text-transform: uppercase;
    }

    .hero-nav-toggle-bars {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      width: 18px;
    }

    .hero-nav-toggle-bars > span {
      background: var(--ink-black);
      border-radius: 1px;
      height: 1.5px;
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .hero-nav.is-open .hero-nav-toggle-bars > span:nth-child(1) {
      transform: translateY(5.5px) rotate(45deg);
    }

    .hero-nav.is-open .hero-nav-toggle-bars > span:nth-child(2) {
      opacity: 0;
    }

    .hero-nav.is-open .hero-nav-toggle-bars > span:nth-child(3) {
      transform: translateY(-5.5px) rotate(-45deg);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(540px, 720px) minmax(430px, 1fr);
      gap: clamp(24px, 4vw, 68px);
      align-items: center;
      padding-top: 76px;
    }

    .hero-copy {
      position: relative;
      z-index: 10;
      padding-bottom: 60px;
    }

    .hero-title {
      margin: 0;
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(58px, 5vw, 68px);
      font-weight: 400;
      line-height: 1.06;
      letter-spacing: 0;
    }

    .hero-title-line {
      display: block;
      white-space: nowrap;
    }

    .hero-title em {
      font-style: italic;
      font-weight: 400;
    }

    .script-accent {
      color: var(--ink-blue);
      display: inline-block;
      font-family: 'Caveat', cursive;
      font-size: clamp(66px, 5.7vw, 76px);
      font-style: normal;
      font-weight: 500;
      line-height: 0.86;
      margin-left: 8px;
      transform: rotate(-3deg) translateY(5px);
    }

    .underlined-phrase {
      display: inline-block;
      position: relative;
    }

    .down-mark {
      color: var(--ink-blue);
      display: inline-block;
      font-family: 'Caveat', cursive;
      font-size: clamp(54px, 5vw, 64px);
      margin-left: 14px;
      transform: translateY(8px);
    }

    .hero-meta {
      color: var(--ink-soft);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.02em;
      line-height: 1.65;
      margin-top: 64px;
      max-width: 680px;
    }

    .newsletter-signup {
      margin-top: 12px;
      max-width: 470px;
    }

    .newsletter-copy {
      display: grid;
      gap: 3px;
      margin-bottom: 10px;
    }

    .newsletter-title {
      color: var(--ink-black);
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 22px;
      letter-spacing: 0;
      line-height: 1;
    }

    .newsletter-desc {
      color: var(--ink-soft);
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    .newsletter-row {
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
      width: min(100%, 420px);
    }

    .newsletter-row input,
    .newsletter-row button {
      border: 1px solid var(--ink-black);
      border-radius: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.02em;
      min-height: 38px;
    }

    .newsletter-row input {
      background: rgba(253, 251, 245, 0.7);
      color: var(--ink-black);
      padding: 0 12px;
      width: 100%;
    }

    .newsletter-row input::placeholder {
      color: #9a9a9a;
    }

    .newsletter-row button {
      background: var(--ink-black);
      color: var(--paper);
      cursor: pointer;
      padding: 0 14px;
    }

    .newsletter-row button:hover {
      background: var(--ink-blue);
      border-color: var(--ink-blue);
    }

    .newsletter-row button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .newsletter-status {
      color: var(--ink-blue);
      font-family: 'Caveat', cursive;
      font-size: 18px;
      line-height: 1;
      margin-top: 9px;
      transform: rotate(-1deg);
    }

    .hidden-field {
      display: none;
    }

    .strike-word {
      display: inline-block;
      margin-right: 4px;
      position: relative;
    }

    .hero-sparkle-one,
    .hero-sparkle-two {
      position: absolute;
      pointer-events: none;
    }

    .hero-sparkle-one {
      left: 52%;
      top: -20px;
    }

    .hero-sparkle-two {
      left: 74%;
      top: 128px;
      transform: rotate(12deg);
    }

    .photo-cluster {
      align-self: center;
      height: clamp(430px, 42vw, 560px);
      position: relative;
      min-width: 0;
    }

    .photo-card {
      background: transparent;
      box-shadow: 0 18px 42px rgba(26, 26, 26, 0.13), 0 2px 8px rgba(26, 26, 26, 0.1);
      overflow: hidden;
      padding: 0;
      position: absolute;
      transform-origin: center center;
    }

    .photo-card--plain {
      background: transparent;
      padding: 0;
    }

    .photo-card img,
    .photo-card video,
    .photo-image {
      display: block;
      height: 100%;
      object-fit: cover;
      width: 100%;
    }

    .photo-card video {
      cursor: pointer;
    }

    .photo-image {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 34%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0 8px, transparent 8px 16px),
        linear-gradient(135deg, #58709d 0%, #c7aa8b 42%, #51775d 100%);
      position: relative;
    }

    .photo-label {
      bottom: 8px;
      color: rgba(255,255,255,0.88);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      left: 10px;
      letter-spacing: 0.05em;
      position: absolute;
      text-transform: uppercase;
    }

    .photo-caption {
      bottom: 6px;
      color: var(--ink-blue);
      font-family: 'Caveat', cursive;
      font-size: 18px;
      left: 10px;
      line-height: 1.1;
      position: absolute;
      right: 10px;
    }

    .photo-back {
      height: 270px;
      left: 2%;
      top: 16%;
      transform: rotate(-6deg);
      width: 220px;
      z-index: 2;
    }

    .photo-main {
      height: min(100%, 520px);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(2deg);
      width: min(78%, 380px);
      z-index: 5;
    }

    .photo-side {
      height: 240px;
      right: 1%;
      top: 42%;
      transform: rotate(8deg);
      width: 200px;
      z-index: 3;
    }

    .tape {
      background: rgba(255, 240, 180, 0.65);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      height: 18px;
      left: 50%;
      pointer-events: none;
      position: absolute;
      top: -10px;
      transform: translateX(-50%) rotate(-3deg);
      width: 60px;
      z-index: 6;
    }

    .cluster-note {
      color: var(--ink-blue);
      font-family: 'Caveat', cursive;
      font-size: 24px;
      left: 12%;
      position: absolute;
      top: 4%;
      transform: rotate(-4deg);
      z-index: 8;
    }

    .cluster-arrow,
    .cluster-scribble,
    .cluster-smiley {
      position: absolute;
      z-index: 8;
    }

    .cluster-arrow {
      left: 24%;
      top: 7%;
      transform: rotate(-15deg);
    }

    .portrait-note {
      color: var(--ink-blue);
      left: -7%;
      position: absolute;
      top: 9%;
      transform: translateX(-25px) rotate(-3deg);
      z-index: 9;
    }

    .portrait-name {
      font-family: 'Caveat', cursive;
      font-size: clamp(42px, 4.2vw, 58px);
      font-weight: 600;
      line-height: 0.9;
    }

    .portrait-role {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      line-height: 1.05;
      margin-top: 8px;
      max-width: 190px;
    }

    html[lang^="zh"] .phone-tap-hint-label {
      font-family: var(--font-script-cjk);
      font-weight: 500;
    }

    html[lang^="zh"] .newsletter-status {
      font-family: var(--font-body-cjk);
      font-weight: 500;
      transform: none;
    }

    html[lang^="zh"] .portrait-name,
    html[lang^="zh"] .portrait-role {
      font-family: var(--font-script-cjk);
      font-weight: 500;
    }

    .portrait-arrow {
      left: 22%;
      position: absolute;
      top: 20%;
      transform: rotate(-14deg);
      z-index: 9;
    }

    .cluster-scribble {
      bottom: 11%;
      left: 2%;
    }

    .cluster-smiley {
      bottom: 15%;
      left: 18%;
      transform: rotate(-8deg);
    }

    .scroll-cue {
      color: #888888;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      position: relative;
      z-index: 5;
    }

    .built-section {
      background: var(--paper-warm);
      border-top: 1px solid rgba(26, 26, 26, 0.12);
      min-height: 100vh;
      padding: 96px 56px;
      position: relative;
      z-index: 2;
    }

    .built-inner {
      margin: 0 auto;
      max-width: 1328px;
    }

    .section-kicker {
      color: var(--ink-blue);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .built-layout {
      align-items: center;
      display: grid;
      gap: clamp(36px, 6vw, 92px);
      grid-template-columns: minmax(520px, 1.15fr) minmax(330px, 0.85fr);
    }

    .built-copy {
      padding-left: clamp(24px, 3vw, 48px);
    }

    .built-copy h2 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(56px, 6vw, 86px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 0.95;
      margin: 0;
    }

    .built-copy p {
      color: #3b3b3b;
      font-size: 17px;
      line-height: 1.6;
      margin: 28px 0 0;
      max-width: 560px;
    }

    .product-intro {
      border-left: 2px solid var(--ink-blue);
      margin-top: 0;
      max-width: 520px;
      padding-left: 18px;
    }

    .product-intro-label {
      color: var(--ink-blue);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .product-intro h3 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(58px, 5vw, 68px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.06;
      margin: 0;
    }

    .product-intro p {
      font-size: 15px;
      line-height: 1.6;
      margin-top: 14px;
    }

    .app-store-badge {
      display: inline-block;
      margin-top: 24px;
      width: 180px;
    }

    .app-store-badge svg {
      display: block;
      height: auto;
      width: 100%;
    }

    .build-entry {
      color: inherit;
      display: block;
      margin-top: 26px;
      max-width: 520px;
      padding: 22px 0 0;
      position: relative;
      text-decoration: none;
    }

    .build-entry-text {
      color: #3b3b3b;
      display: block;
      font-size: 14px;
      line-height: 1.55;
      margin-top: 6px;
      max-width: 440px;
    }

    .build-entry::before {
      background: rgba(26, 26, 26, 0.2);
      content: "";
      height: 1px;
      left: 0;
      position: absolute;
      top: 0;
      width: 60%;
    }

    .build-entry:hover .build-entry-link {
      text-decoration-color: currentColor;
    }

    .build-entry-label {
      color: var(--ink-blue);
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      margin-bottom: 11px;
      text-transform: uppercase;
    }

    .build-entry strong {
      display: block;
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
    }

    .build-entry p {
      color: #3b3b3b;
      font-size: 14px;
      line-height: 1.6;
      margin-top: 12px;
      max-width: 460px;
    }

    .build-entry-link {
      color: var(--ink-blue);
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      line-height: 1.2;
      margin-top: 14px;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 5px;
      text-transform: uppercase;
      transition: text-decoration-color 160ms ease;
    }

    .phone-shell {
      background: transparent;
      border: 0;
      border-radius: 42px;
      box-shadow: none;
      justify-self: center;
      padding: 22px;
      position: relative;
      width: min(100%, 320px);
    }

    .phone-tap-hint {
      align-items: flex-start;
      display: flex;
      flex-direction: column;
      left: 14px;
      pointer-events: none;
      position: absolute;
      top: -68px;
      z-index: 10;
    }

    .phone-tap-hint-label {
      color: var(--ink-blue);
      font-family: 'Caveat', cursive;
      font-size: 22px;
      line-height: 1;
      transform: rotate(-4deg);
      white-space: nowrap;
    }

    @keyframes app-icon-pulse {
      0%, 100% { transform: scale(1); }
      35%, 65% { transform: scale(1.07); }
    }

    .built-section.has-entered .home-app--released .home-app-icon {
      animation: app-icon-pulse 1.5s ease-in-out 0.4s 3;
    }

    @media (prefers-reduced-motion: reduce) {
      .built-section.has-entered .home-app--released .home-app-icon {
        animation: none;
      }
    }

    .phone-scribble-frame {
      display: block;
      filter: url(#rough-paper);
      pointer-events: none;
      position: absolute;
      z-index: 4;
    }

    .phone-scribble-frame path {
      stroke-width: 2.6px;
    }

    .phone-scribble-frame--outer {
      height: calc(100% - 10px);
      left: 5px;
      top: 5px;
      width: calc(100% - 10px);
    }

    .phone-scribble-frame--inner {
      height: 100%;
      inset: 0;
      overflow: visible;
      width: 100%;
    }

    .phone-top {
      align-items: center;
      color: #fdfbf5;
      display: grid;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      grid-template-columns: 1fr auto 1fr;
      padding: 4px 16px 10px;
    }

    .phone-top span:last-child {
      justify-self: end;
    }

    .phone-island {
      background: #050505;
      border-radius: 999px;
      display: block;
      height: 22px;
      width: 82px;
    }

    .phone-screen {
      aspect-ratio: 900 / 1920;
      border-radius: 32px;
      box-shadow: 0 20px 52px rgba(26, 26, 26, 0.12);
      overflow: visible;
      position: relative;
    }

    .phone-wallpaper {
      border-radius: 32px;
      display: block;
      height: 100%;
      object-fit: cover;
      overflow: hidden;
      width: 100%;
    }

    .phone-demo-video {
      border-radius: 32px;
      display: block;
      height: 100%;
      object-fit: cover;
      width: 100%;
    }

    .home-app-layer {
      inset: 0;
      position: absolute;
    }

    .phone-demo-video + .phone-scribble-frame + .home-app-layer {
      display: none;
    }

    .phone-home-button {
      background: rgba(253, 251, 245, 0.8);
      border: 1px solid rgba(29, 58, 138, 0.45);
      bottom: 28px;
      color: var(--ink-blue);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      left: 50%;
      letter-spacing: 0.04em;
      padding: 8px 10px;
      position: absolute;
      transform: translateX(-50%);
      z-index: 6;
    }

    .phone-home-button:hover {
      background: var(--ink-blue);
      color: var(--paper);
    }

    .home-app {
      background: transparent;
      border: 0;
      color: #fff;
      cursor: pointer;
      display: grid;
      font-family: 'Inter', sans-serif;
      gap: 7px;
      justify-items: center;
      padding: 0;
      position: absolute;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.38);
      width: 74px;
    }

    .home-app:focus-visible {
      outline: 2px solid var(--ink-blue);
      outline-offset: 3px;
    }

    .home-app--released {
      left: 6.8%;
      top: 8.2%;
    }

    .home-app--brewing {
      left: 34%;
      top: 8.2%;
    }

    .home-app-icon {
      align-items: center;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
      color: var(--paper);
      display: grid;
      font-family: 'Caveat', cursive;
      font-size: 34px;
      font-weight: 700;
      height: 58px;
      letter-spacing: 0;
      line-height: 1;
      place-items: center;
      width: 58px;
    }

    .home-app.is-selected .home-app-icon {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.95), 0 0 0 4px var(--ink-blue), 0 12px 24px rgba(0,0,0,0.2);
    }

    .home-app-icon--brewing {
      background:
